<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our 5th Anniversary ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    color: #4a2c2a;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
}

#countdown {
    font-size: 20px;
    margin-bottom: 20px;
}

button {
    background: #ff8fab;
    border: none;
    padding: 12px 20px;
    border-radius: 20px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff5d8f;
}

.hidden {
    display: none;
}

/* opening screen */
#opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#opening button {
    margin-top: 20px;
}

/* gallery */
.gallery img {
    width: 200px;
    border-radius: 15px;
    margin: 10px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
    <h2>I made this just for you</h2>
    <button onclick="startExperience()">Open ❤️</button>
</div>

<div class="container hidden" id="mainContent">

    <h1>Happy 5th Anniversary ❤️</h1>

    <div id="countdown"></div>

    <!-- MUSIC -->
    <button onclick="toggleMusic()" id="musicBtn">🎵 Play Music</button>
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- MEMORY -->
    <h2>Our Memories</h2>
    <div class="gallery">
        <img src="images/photo1.jpg">
        <img src="images/photo2.jpg">
        <img src="images/photo3.jpg">
    </div>

    <!-- MESSAGE -->
    <h2>For You</h2>
    <p>
        Thank you for being with me through everything.  
        These 5 years mean more than words can say.
    </p>

</div>

<script>
function startExperience() {
    document.getElementById("opening").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");
}

/* MUSIC */
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

function toggleMusic() {
    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause Music";
    } else {
        music.pause();
        btn.innerText = "🎵 Play Music";
    }
}

/* COUNTDOWN */
const targetDate = new Date("March 25, 2026 00:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const d = Math.floor(distance / (1000*60*60*24));
    const h = Math.floor((distance / (1000*60*60)) % 24);
    const m = Math.floor((distance / (1000*60)) % 60);
    const s = Math.floor((distance / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        d + "d " + h + "h " + m + "m " + s + "s";

    if (distance < 0) {
        document.getElementById("countdown").innerHTML =
            "Happy 5th Anniversary ❤️";
    }
}, 1000);
</script>

</body>
</html>
